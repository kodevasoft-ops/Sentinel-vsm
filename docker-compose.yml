version: "3.8"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: sentinel-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"        # RTSP
      - "1935:1935"        # RTMP
      - "8888:8888"        # HLS
      - "8889:8889"        # WebRTC (WHEP) - lo que usa el navegador
      - "8189:8189/udp"    # WebRTC UDP
      - "9997:9997"        # API de control (la usa el backend)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml   # sin :ro — MediaMTX necesita poder escribir aquí para
                                        # persistir las cámaras agregadas dinámicamente por la API;
                                        # si quedaba de solo lectura, los registros no sobrevivían un reinicio

  backend:
    build: ./backend
    container_name: sentinel-backend
    restart: unless-stopped
    ports:
      - "4000:4000"        # API del backend - esto es lo que faltaba mapear
    env_file:
      - ./backend/.env
    volumes:
      - sentinel-data:/app/data
    depends_on:
      - mediamtx

volumes:
  sentinel-data:
